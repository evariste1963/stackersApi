<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/css/main.css">
  <link rel="stylesheet" href="/src/css/page.css">
  <title>Login - Stackers API</title>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <img src="./src/img/pngegg.png" alt="logo" class="auth-logo">
      <h1>Stackers Login</h1>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">Login</button>
        <div id="error" class="error-msg hidden"></div>
      </form>
      <p class="auth-link">Don't have an account? <a href="/register.html">Register here</a></p>
      <p class="auth-link"><a href="/">Back to Home</a></p>
    </div>
  </div>
  <script type="module">
    import { login, isAuthenticated } from '/src/js/auth.js';
    
    if (isAuthenticated()) {
      window.location.href = '/';
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('error');
      errorDiv.classList.add('hidden');
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        await login(username, password);
        window.location.href = '/';
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
