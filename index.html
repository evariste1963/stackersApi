<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/main.css" />
    
    <script type="importmap">
    {
      "imports": {
        "apexcharts": "/node_modules/apexcharts/dist/apexcharts.min.js"
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.js"
      integrity="sha512-VcwFAndRWOHd2GciF0dxUnsMlQGvIWMzKaOECoZT/xvKE3B6Lsow+xtuoi+fI/hBKF2F05mgLcynmICdvI4a4g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module" defer src="/src/js/controller.js"></script>
    <!-- <script defer src="/src/js/scrapes.js"></script> -->

    <title>Stackers API</title>
    <!-- header image below -->
   <link rel="icon" href="./src/img/pngegg.png" type="image/x-icon" /> 
  </head>
  <body>
    <div class="bg">
      <div class="container">
        <div class="header sticky">
          <div id="headerTop">
            <img
              id="logo"
              src="./src/img/pngegg.png"
              alt="logo"
              width="120"
              height="80"
            />
            <p id="logotext">stackers</p>
            <div class="btnDiv">
              <div id="authNav" class="auth-nav"></div>
              <button class="btn-update">GET LATEST PRICE</button>
              <button class="btn-stack modal">Add to Stack</button>
              <!-- <div class="dropdown" id="accountDropdown" style="display: none;"> -->
                <button class="btn-stack auth-dropdown" id="accountDropdown">Account ▼</button>
                <div class="dropdown-content">
                  <a href="/settings.html">Settings</a>
                  <a href="#" id="logoutLink">Logout</a>
                </div>
              <!-- </div> -->
            </div>
          </div>
          <div id="spotRunner">
            <div class="spotTicker">Spot Price</div>
          </div>
        </div>
        <div id="accStatus"></div>
        <div class="page">
          <div class="chartArea">
            <div id="chart" class="chart1"></div>
          </div>
          <div class="statTicker">Statistics</div>
          <div class="userStack">Your Stack</div>
        </div>
      </div>
      <div class="overlay hidden">
        <div class="add-stack-window hidden">
          <button type="button" class="btn--close-modal modal">&times;</button>
          <h3 class="upload__heading">Stack something precious</h3>
          <form class="upload" onsubmit="return false;">
            <div class="upload__column">
              <label>Code <input value="XUA" required name="code" type="text" /></label>
              <label>Weight <input value="TESTing" required name="weight" type="text" /></label>
              <label>Purchase Price <input value="TESTing" required name="purchase price" type="text" /></label>
              <label>Premium % <input value="23" required name="premium" type="number" /></label>
              <label>Spare1 <input value="TESTing" required name="spare1" type="text" /></label>
              <label>Spare2 <input value="23" required name="spare2" type="number" /></label>
            </div>
            <button type="button" class="btn upload__btn modal">
              <img
                src="./src/img/pngegg.png"
                alt="logo"
                width="70"
                height="50"
              />
              <span style="font-size: 2rem">Submit</span>
            </button>
          </form>
        </div>
      </div>
      <div>
        <footer>
          <h3 id="footnote">coded by <span id="tag">this.me</span></h3>
        </footer>
      </div>
    </div>
  </body>
</html>
